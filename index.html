<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fintech Latam Ecosystem Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: 222 47% 11%;
      --secondary: 215 25% 27%;
      --gold: 32 95% 44%;
      --font-display: "Playfair Display", Georgia, serif;
      --font-body: "DM Sans", system-ui, sans-serif;
      --bg: hsl(var(--primary));
      --surface: hsl(var(--primary));
      --surface2: hsl(var(--secondary));
      --border: hsl(var(--secondary));
      --accent: hsl(var(--gold));
      --accent2: #cbd5e1;
      --green: #cbd5e1;
      --yellow: hsl(var(--gold));
      --orange: #fe9e4e;
      --pink: #FE4E7A;
      --text: #ffffff;
      --text-muted: #e2e8f0;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* GLOBAL NAV */
    .global-nav { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
    .global-brand { display: flex; align-items: center; gap: 10px; }
    .global-logo { width: 120px; height: 120px; object-fit: contain; display: block; }
    .global-year { font-size: 10px; letter-spacing: .08em; color: var(--text-muted); }
    .global-links { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .global-nav-link { color: var(--text-muted); text-decoration: none; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; padding: 6px 12px; border: 1px solid transparent; border-radius: 999px; transition: all .2s; }
    .global-nav-link:hover { color: var(--text); border-color: var(--border); }
    .global-nav-link.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .lang-switch { display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); padding: 3px; background: var(--surface); }
    .lang-btn { font-family: var(--font-body); font-size: 10px; border: none; background: transparent; color: var(--text-muted); padding: 6px 8px; cursor: pointer; letter-spacing: .08em; }
    .lang-btn.active, .lang-btn:hover { background: var(--accent); color: #000; }
    #google_translate_element { position: absolute; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }

    /* FILTERS */
    .filters { padding: 8px 28px; display: flex; gap: 7px; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; flex-shrink: 0; }
    .filter-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-right: 4px; }
    .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
    .filter-dot { width: 8px; height: 8px; border-radius: 50%; }
    .filter-spacer { flex: 1; }
    .filter-stats { display: flex; align-items: center; gap: 8px; }
    .filter-stat { border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px; font-size: 10px; color: var(--text-muted); letter-spacing: .05em; text-transform: uppercase; }
    .filter-stat strong { color: var(--accent); font-weight: 700; }

    /* MAIN */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* MAP */
    #map-container { flex: 1; position: relative; overflow: hidden; }
    #map-svg { width: 100%; height: 100%; }
    .country { cursor: pointer; transition: filter .2s; stroke: #1a3a5c; stroke-width: .8; }
    .country:hover { filter: brightness(1.4); stroke: var(--accent); stroke-width: 1.5; }
    .country.active { stroke: var(--accent); stroke-width: 2; filter: brightness(1.3); }
    .country.dimmed { opacity: .25; }
    .bubble-label { font-size: 9px; fill: white; text-anchor: middle; dominant-baseline: middle; pointer-events: none; font-weight: 600; }
    #map-container::before { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(203,213,225,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(203,213,225,.05) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }

    /* SIDEBAR */
    .sidebar { width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    .sidebar-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
    .sidebar-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 14px; }
    .sidebar-content::-webkit-scrollbar { width: 4px; }
    .sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Overview */
    .ranking-item { display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 8px; margin-bottom: 6px; background: var(--surface2); border: 1px solid var(--border); }
    .rank-num { font-size: 11px; color: var(--text-muted); width: 16px; text-align: center; font-weight: 600; }
    .rank-flag { font-size: 18px; }
    .rank-info { flex: 1; }
    .rank-country { font-size: 12px; font-weight: 600; }
    .rank-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .rank-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg,var(--accent),var(--accent2)); }
    .rank-count { font-size: 13px; font-weight: 700; color: var(--accent); }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 14px 0 8px; font-weight: 600; }
    .sector-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .sector-icon { font-size: 13px; width: 18px; text-align: center; }
    .sector-name { font-size: 12px; flex: 1; }
    .sector-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .sector-bar { height: 100%; border-radius: 3px; }
    .sector-count { font-size: 12px; font-weight: 600; color: var(--text-muted); width: 22px; text-align: right; }

    /* Country panel */
    .country-panel { display: none; }
    .country-panel.visible { display: block; }
    .country-flag { font-size: 28px; margin-bottom: 6px; }
    .country-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .country-meta { display: flex; gap: 10px; margin-bottom: 14px; }
    .meta-item { text-align: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; flex: 1; }
    .meta-value { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--accent); }
    .meta-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    /* Category tabs */
    .cat-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .cat-tab { padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all .2s; }
    .cat-tab.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    /* Company cards */
    .company-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 10px; }
    .company-card:hover { border-color: var(--accent); transform: translateX(2px); background: #152a4a; }
    .company-logo { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; font-weight: 700; }
    .company-info { flex: 1; min-width: 0; }
    .company-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .company-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .company-tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
    .unicorn-badge { font-size: 12px; }

    /* Zoom */
    .zoom-controls { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 4px; }
    .zoom-btn { width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .zoom-btn:hover { background: var(--surface2); border-color: var(--accent); }

    /* Legend */
    .legend { position: absolute; bottom: 20px; left: 20px; background: color-mix(in srgb, var(--surface) 88%, transparent); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; backdrop-filter: blur(8px); }
    .legend-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 7px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Tooltip */
    .tooltip { position: fixed; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 100; max-width: 200px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .tooltip.visible { opacity: 1; }
    .tooltip-country { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
    .tooltip-count { color: var(--accent); font-weight: 600; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(4px); }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 420px; max-width: 90vw; padding: 24px; position: relative; transform: translateY(12px); transition: transform .2s; box-shadow: 0 24px 60px rgba(0,0,0,.6); }
    .modal-overlay.visible .modal { transform: translateY(0); }
    .modal-close { position: absolute; top: 14px; right: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all .2s; }
    .modal-close:hover { border-color: var(--accent); color: var(--text); }
    .modal-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
    .modal-logo { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .modal-title-wrap { flex: 1; }
    .modal-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; line-height: 1.2; }
    .modal-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
    .modal-tag { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 600; }
    .modal-country { font-size: 12px; color: var(--text-muted); }
    .modal-desc { font-size: 13px; color: var(--text); line-height: 1.65; margin-bottom: 20px; }
    .modal-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; background: linear-gradient(90deg,var(--accent),var(--accent2)); border: none; border-radius: 10px; color: var(--bg); font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s; text-decoration: none; }
    .modal-btn:hover { opacity: .9; }
    .modal-divider { border: none; border-top: 1px solid var(--border); margin-bottom: 16px; }
  </style>
</head>

// MAP SETUP
// ─────────────────────────────────────────────
const svg = d3.select('#map-svg');
const container = document.getElementById('map-container');
let width = container.clientWidth;
let height = container.clientHeight;
const g = svg.append('g');

const projection = d3.geoNaturalEarth1()
  .center([-60, -15])
  .scale(Math.min(width, height) * 1.1)
  .translate([width / 2 - 80, height / 2]);

const path = d3.geoPath().projection(projection);

const zoom = d3.zoom().scaleExtent([0.5, 8]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

document.getElementById('zoom-in').addEventListener('click', () => svg.transition().duration(300).call(zoom.scaleBy, 1.5));
document.getElementById('zoom-out').addEventListener('click', () => svg.transition().duration(300).call(zoom.scaleBy, 0.67));
document.getElementById('zoom-reset').addEventListener('click', () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity));

function getCountryColor(code) {
  const count = getFilteredCompanies(code).length;
  if (count === 0)  return '#1f2937';
  if (count <= 5)   return '#374151';
  if (count <= 15)  return '#4b5563';
  if (count <= 25)  return '#6b7280';
  return '#9ca3af';
}

function getFilteredCompanies(code) {
  const data = COMPANIES[code];
  if (!data) return [];
  let list = data.companies;
  if (activeSector !== 'all') list = list.filter(c => c.sector === activeSector);
  return list;
}

const numericToAlpha3 = {
  32:'ARG',68:'BOL',76:'BRA',152:'CHL',170:'COL',188:'CRI',192:'CUB',214:'DOM',
  218:'ECU',222:'SLV',320:'GTM',332:'HTI',340:'HND',388:'JAM',484:'MEX',558:'NIC',
  591:'PAN',600:'PRY',604:'PER',740:'SUR',780:'TTO',858:'URY',862:'VEN',328:'GUY',84:'BLZ',
};
const isoMap = {
  'BRA':'BR','MEX':'MX','COL':'CO','ARG':'AR','CHL':'CL','PER':'PE','URY':'UY',
  'CRI':'CR','ECU':'EC','VEN':'VE','PAN':'PA','GTM':'GT','BOL':'BO','PRY':'PY',
  'HND':'HN','NIC':'NI','SLV':'SV','DOM':'DO',
};

// Tooltip
const tooltip = document.getElementById('tooltip');
let countryPaths;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);

    countryPaths = g.selectAll('.country')
      .data(countries.features)
      .join('path')
      .attr('class', 'country')
      .attr('d', path)
      .attr('fill', d => {
        const code = isoMap[numericToAlpha3[+d.id]];
        return getCountryColor(code);
      })
      .on('mouseover', function(event, d) {
        const code = isoMap[numericToAlpha3[+d.id]];
        const data = COMPANIES[code];
        if (!data) return;
        const companies = getFilteredCompanies(code);
        document.getElementById('tt-country').textContent = `${data.flag} ${data.name}`;
        document.getElementById('tt-info').innerHTML =
          `<span class="tooltip-count">${companies.length} empresas</span>` +
          (data.companies.filter(c => c.type === 'unicorn').length > 0
            ? ` · 🦄 ${data.companies.filter(c => c.type === 'unicorn').length}`
            : '');
        tooltip.classList.add('visible');
      })
      .on('mousemove', event => {
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 40) + 'px';
      })
      .on('mouseout', () => tooltip.classList.remove('visible'))
      .on('click', function(event, d) {
        const code = isoMap[numericToAlpha3[+d.id]];
        if (!COMPANIES[code]) return;
        if (activeCountry === code) {
          activeCountry = null;
          showOverview();
          countryPaths.classed('active', false).classed('dimmed', false);
        } else {
          activeCountry = code;
          activeCategory = 'all';
          showCountry(code);
          countryPaths
            .classed('dimmed', dd => {
              const c = isoMap[numericToAlpha3[+dd.id]];
              return c !== code && !!COMPANIES[c];
            })
            .classed('active', dd => isoMap[numericToAlpha3[+dd.id]] === code);
        }
      });

    // Compute centroids
    const centroids = {};
    countries.features.forEach(f => {
      const code = isoMap[numericToAlpha3[+f.id]];
      if (COMPANIES[code]) {
        const c = path.centroid(f);
        if (!isNaN(c[0])) centroids[code] = c;
      }
    });

    updateBubbles(centroids);

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSector = btn.dataset.sector;
        countryPaths.attr('fill', d => {
          const code = isoMap[numericToAlpha3[+d.id]];
          return getCountryColor(code);
        });
        updateBubbles(centroids);
        if (activeCountry) showCountry(activeCountry);
        else showOverview();
      });
    });

    showOverview();
  });

function updateBubbles(centroids) {
  g.selectAll('.company-bubble').remove();
  Object.entries(centroids).forEach(([code, [x, y]]) => {
    const companies = getFilteredCompanies(code);
    if (!companies.length) return;
    const topSector = Object.entries(
      companies.reduce((a, c) => { a[c.sector] = (a[c.sector] || 0) + 1; return a; }, {})
    ).sort((a, b) => b[1] - a[1])[0][0];
    const color = SECTORS[topSector]?.color || '#9ca3af';
    const r = Math.min(4 + companies.length * 1.1, 22);

    const bub = g.append('g').attr('class', 'company-bubble').attr('transform', `translate(${x},${y})`);
    bub.append('circle').attr('r', r + 4).attr('fill', 'none').attr('stroke', color).attr('stroke-width', .8).attr('opacity', .3);
    bub.append('circle').attr('r', r).attr('fill', color).attr('fill-opacity', .85).attr('stroke', 'white').attr('stroke-width', .5);
    bub.append('text').attr('class', 'bubble-label').text(companies.length);
  });
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function showOverview() {
  document.getElementById('overview-panel').style.display = 'block';
  document.getElementById('country-panel').style.display = 'none';
  document.getElementById('sidebar-title').textContent = 'Ecosystem Overview';
  document.getElementById('sidebar-sub').textContent = 'Seleccioná un país para explorar su ecosistema';

  const ranking = Object.entries(COMPANIES)
    .map(([code, d]) => ({ code, name: d.name, flag: d.flag, count: getFilteredCompanies(code).length }))
    .filter(x => x.count > 0)
    .sort((a, b) => b.count - a.count);

  const maxCount = ranking[0]?.count || 1;
  document.getElementById('ranking-list').innerHTML = ranking.map((r, i) => `
    <div class="ranking-item">
      <span class="rank-num">${i + 1}</span>
      <span class="rank-flag">${r.flag}</span>
      <div class="rank-info">
        <div class="rank-country">${r.name}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(r.count/maxCount*100).toFixed(0)}%"></div></div>
      </div>
      <span class="rank-count">${r.count}</span>
    </div>
  `).join('');

  const sectorCounts = {};
  Object.values(COMPANIES).forEach(d => {
    d.companies.forEach(c => {
      if (activeSector === 'all' || c.sector === activeSector)
        sectorCounts[c.sector] = (sectorCounts[c.sector] || 0) + 1;
    });
  });
  const maxS = Math.max(...Object.values(sectorCounts));
  document.getElementById('sector-breakdown').innerHTML = Object.entries(sectorCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([sector, count]) => {
      const s = SECTORS[sector];
      return `<div class="sector-row">
        <span class="sector-icon">${s.icon}</span>
        <span class="sector-name">${s.label}</span>
        <div class="sector-bar-wrap"><div class="sector-bar" style="width:${(count/maxS*100).toFixed(0)}%;background:${s.color}"></div></div>
        <span class="sector-count">${count}</span>
      </div>`;
    }).join('');
}

function showCountry(code) {
  const data = COMPANIES[code];
  if (!data) return;

  document.getElementById('overview-panel').style.display = 'none';
  document.getElementById('country-panel').style.display = 'block';
  document.getElementById('sidebar-title').textContent = data.name;

  const allFiltered = getFilteredCompanies(code);
  const unicorns = allFiltered.filter(c => c.type === 'unicorn');
  const startups = allFiltered.filter(c => c.type === 'startup');
  document.getElementById('sidebar-sub').textContent =
    `${allFiltered.length} empresas · 🦄 ${unicorns.length} unicornios`;

  document.getElementById('cp-flag').textContent = data.flag;
  document.getElementById('cp-name').textContent = data.name;

  const sectors = [...new Set(data.companies.map(c => c.sector))].length;
  document.getElementById('cp-meta').innerHTML = `
    <div class="meta-item"><div class="meta-value">${allFiltered.length}</div><div class="meta-label">Empresas</div></div>
    <div class="meta-item"><div class="meta-value">${unicorns.length}</div><div class="meta-label">Unicornios</div></div>
    <div class="meta-item"><div class="meta-value">${sectors}</div><div class="meta-label">Sectores</div></div>
  `;

  // Category tabs
  document.getElementById('cp-tabs').innerHTML = `
    <button class="cat-tab ${activeCategory==='all'?'active':''}" data-cat="all">Todas (${allFiltered.length})</button>
    ${unicorns.length ? `<button class="cat-tab ${activeCategory==='unicorn'?'active':''}" data-cat="unicorn">🦄 Unicornios (${unicorns.length})</button>` : ''}
    ${startups.length ? `<button class="cat-tab ${activeCategory==='startup'?'active':''}" data-cat="startup">🚀 Startups (${startups.length})</button>` : ''}
  `;
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderCompanyList(code);
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  renderCompanyList(code);
}

function renderCompanyList(code) {
  const data = COMPANIES[code];
  let list = getFilteredCompanies(code);
  if (activeCategory === 'unicorn') list = list.filter(c => c.type === 'unicorn');
  if (activeCategory === 'startup') list = list.filter(c => c.type === 'startup');

  document.getElementById('cp-companies').innerHTML = list.map(c => {
    const s = SECTORS[c.sector];
    return `
      <div class="company-card" data-code="${code}" data-name="${c.name}">
        <div class="company-logo" style="background:${s.color}22;color:${s.color}">${c.logo}</div>
        <div class="company-info">
          <div class="company-name">
            ${c.name}
            ${c.type === 'unicorn' ? '<span class="unicorn-badge">🦄</span>' : ''}
          </div>
          <div class="company-desc">${c.desc.substring(0, 60)}…</div>
        </div>
        <div class="company-tag" style="background:${s.color}22;color:${s.color}">${s.label}</div>
      </div>
    `;
  }).join('');

  // Attach click → modal
  document.querySelectorAll('.company-card').forEach(card => {
    card.addEventListener('click', () => {
      const cCode = card.dataset.code;
      const cName = card.dataset.name;
      const company = COMPANIES[cCode].companies.find(c => c.name === cName);
      if (company) openModal(company, COMPANIES[cCode]);
    });
  });
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(company, countryData) {
  const s = SECTORS[company.sector];
  document.getElementById('m-logo').textContent = company.logo;
  document.getElementById('m-logo').style.background = s.color + '22';
  document.getElementById('m-logo').style.color = s.color;
  document.getElementById('m-name').textContent = company.name + (company.type === 'unicorn' ? ' 🦄' : '');
  document.getElementById('m-tag').textContent = s.label;
  document.getElementById('m-tag').style.background = s.color + '22';
  document.getElementById('m-tag').style.color = s.color;
  document.getElementById('m-country').textContent = `${countryData.flag} ${countryData.name}`;
  document.getElementById('m-desc').textContent = company.desc;
  document.getElementById('m-btn').href = company.url;
  document.getElementById('modal-overlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

function updateActiveLanguage(lang) {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
}

function setLanguage(lang) {
  const combo = document.querySelector('.goog-te-combo');
  if (!combo) return;
  combo.value = lang;
  combo.dispatchEvent(new Event('change'));
  updateActiveLanguage(lang);
}

function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'es',
    includedLanguages: 'es,en,it',
    autoDisplay: false
  }, 'google_translate_element');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  projection.scale(Math.min(width, height) * 1.1).translate([width / 2 - 80, height / 2]);
  if (countryPaths) countryPaths.attr('d', path);
});
</script>
